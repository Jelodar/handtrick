<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>HandTrick Wheel</title>
<style>
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #050505; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #surface { position: fixed; inset: 0; display: grid; place-items: center; touch-action: none; }
    #frame { width: min(72vw, 520px); aspect-ratio: 16 / 9; display: grid; place-items: center; border: 1px solid rgba(255,255,255,0.2); background: #0a0a0a; transform-origin: center; font-size: 12px; font-weight: 900; letter-spacing: 0.16em; }
    #hud { position: fixed; left: 14px; bottom: 14px; font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; color: rgba(255,255,255,0.72); }
</style>
</head>
<body>
<main id="surface">
    <div id="frame">WHEEL</div>
    <div id="hud">scale=1.00; wheel preventDefault is enabled here</div>
</main>
<script src="../handtrick.js"></script>
<script>
const surface = document.getElementById('surface');
const frame = document.getElementById('frame');
const hud = document.getElementById('hud');
let scale = 1;
const hand = new HandTrick(surface, ['viewer', {
    intent: { events: ['wheel:zoom'] },
    wheel: { preventDefault: true, zoomFactor: 0.0015 }
}]);

hand.on('wheel:zoom', event => {
    scale = Math.max(0.3, Math.min(4, scale * event.scale));
    frame.style.transform = 'scale(' + scale + ')';
    hud.textContent = 'scale=' + scale.toFixed(2) + ' region=' + event.region + ' delta=' + Math.round(event.deltaY);
});
</script>
</body>
</html>
