<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>HandTrick Media</title>
<style>
    * {
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #surface {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        touch-action: none;
        overflow: hidden;
    }

    #frame {
        width: min(74vw, 720px);
        aspect-ratio: 16 / 9;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255,255,255,0.2);
        background:
            radial-gradient(circle at 45% 38%, rgba(255,255,255,0.18), transparent 24%),
            linear-gradient(135deg, #101010, #020202);
        transform-origin: center;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.16em;
    }

    #hud {
        position: fixed;
        left: 14px;
        bottom: 14px;
        font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        color: rgba(255,255,255,0.7);
    }
</style>
</head>
<body>
<main id="surface">
    <div id="frame">TAP-HOLD PAN</div>
    <div id="hud">scale=1.00 x=0 y=0</div>
</main>
<script src="../handtrick.js"></script>
<script>
const surface = document.getElementById('surface');
const frame = document.getElementById('frame');
const hud = document.getElementById('hud');
const state = { x: 0, y: 0, scale: 1, rotation: 0, startX: 0, startY: 0, startScale: 1, startRotation: 0 };
const hand = new HandTrick(surface, ['media', {
    pan: { canStart: event => event.tapHold },
    rotate: { enabled: true, angle: 10, minTime: 90, minSamples: 2, confidence: 0.7 }
}]);

function render() {
    frame.style.transform = 'translate(' + state.x + 'px,' + state.y + 'px) rotate(' + state.rotation + 'deg) scale(' + state.scale + ')';
    hud.textContent = 'scale=' + state.scale.toFixed(2) + ' rot=' + Math.round(state.rotation) + ' x=' + Math.round(state.x) + ' y=' + Math.round(state.y);
}

hand.on('pan:start', () => {
    state.startX = state.x;
    state.startY = state.y;
});

hand.on('pan', event => {
    state.x = state.startX + event.deltaX;
    state.y = state.startY + event.deltaY;
    render();
});

hand.on('pinch:start', () => {
    state.startScale = state.scale;
});

hand.on('pinch', event => {
    state.scale = Math.max(0.35, Math.min(4, state.startScale * event.scale));
    render();
});

hand.on('rotate:start', () => {
    state.startRotation = state.rotation;
});

hand.on('rotate', event => {
    state.rotation = state.startRotation + event.rotation;
    render();
});

hand.on('tap', { region: 'left' }, () => {
    hud.textContent = 'previous';
});

hand.on('tap', { region: 'right' }, () => {
    hud.textContent = 'next';
});

hand.on('swipe', event => {
    hud.textContent = 'swipe ' + event.direction;
});
</script>
</body>
</html>
