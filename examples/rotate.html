<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>HandTrick Rotate</title>
<style>
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #050505; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #surface { position: fixed; inset: 0; display: grid; place-items: center; touch-action: none; }
    #box { width: min(54vw, 220px); aspect-ratio: 1; display: grid; place-items: center; border: 1px solid rgba(255,255,255,0.32); color: rgba(255,255,255,0.72); font-size: 12px; font-weight: 900; letter-spacing: 0.16em; transform-origin: center; }
    #readout { position: fixed; left: 14px; bottom: 14px; font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; color: rgba(255,255,255,0.72); }
</style>
</head>
<body>
<main id="surface">
    <div id="box">ROTATE</div>
    <div id="readout">rotation=0; twist deliberately, pan-like motion is rejected</div>
</main>
<script src="../handtrick.js"></script>
<script>
const surface = document.getElementById('surface');
const box = document.getElementById('box');
const readout = document.getElementById('readout');
let rotation = 0;
let startRotation = 0;
const hand = new HandTrick(surface, ['map', {
    intent: { events: ['rotate'] },
    pan: { enabled: false },
    swipe: { enabled: false },
    pinch: { enabled: false },
    rotate: { angle: 6, minTime: 70, minSamples: 2, dominance: 0.36, confidence: 0.62 }
}]);

hand.on('rotate:start', () => {
    startRotation = rotation;
});
hand.on('rotate', event => {
    rotation = startRotation + event.rotation;
    box.style.transform = 'rotate(' + rotation + 'deg)';
    readout.textContent = 'rotation=' + rotation.toFixed(1) + ' delta=' + event.rotation.toFixed(1) + ' confidence=' + event.confidence.toFixed(2);
});
</script>
</body>
</html>
