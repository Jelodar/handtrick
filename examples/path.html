<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>HandTrick Path</title>
<style>
    * {
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050505;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #surface {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        touch-action: none;
        background:
            linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
            #050505;
        background-size: 40px 40px;
    }

    #readout {
        min-width: min(84vw, 520px);
        padding: 22px;
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(0,0,0,0.34);
        font-size: 13px;
        line-height: 1.7;
    }

    b {
        display: block;
        margin-top: 8px;
        font: 22px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        color: #0a84ff;
    }
</style>
</head>
<body>
<main id="surface">
    <div id="readout">Draw down then right without lifting.<b>none</b></div>
</main>
<script src="../handtrick.js"></script>
<script>
const surface = document.getElementById('surface');
const readout = document.getElementById('readout');
const value = readout.querySelector('b');
const hand = new HandTrick(surface, {
    intent: { events: ['down>right', 'left>up'] },
    pan: { enabled: false },
    swipe: { enabled: false },
    path: {
        minDistance: 42,
        segmentDistance: 42,
        axisRatio: 1.35,
        turnAngle: 55
    }
});

hand.on('path', event => {
    value.textContent = event.pathText || 'none';
});

hand.on('down>right', () => {
    value.textContent = 'matched down>right';
});

hand.on('left>up', () => {
    value.textContent = 'matched left>up';
});

hand.on('pathend', event => {
    if (!event.pathText) value.textContent = 'none';
});
</script>
</body>
</html>
