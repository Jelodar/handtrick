<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>HandTrick Router</title>
<style>
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #050505; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main { position: fixed; inset: 0; display: grid; grid-template-columns: minmax(280px, 360px) 1fr; }
    aside { display: grid; align-content: start; gap: 12px; padding: 14px; border-right: 1px solid rgba(255,255,255,0.14); background: rgba(0,0,0,0.62); }
    #surface { position: relative; display: grid; place-items: center; touch-action: none; background: #050505; }
    #target { width: min(54vmin, 440px); aspect-ratio: 1; border: 1px solid rgba(255,255,255,0.22); display: grid; place-items: center; color: rgba(255,255,255,0.62); font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    label { display: grid; gap: 6px; color: rgba(255,255,255,0.58); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
    input, textarea, select, button { width: 100%; border: 1px solid rgba(255,255,255,0.16); border-radius: 4px; background: rgba(255,255,255,0.045); color: #fff; font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    input, textarea, select { padding: 10px; outline: none; }
    textarea { min-height: 120px; resize: vertical; line-height: 1.45; }
    button { min-height: 38px; cursor: pointer; }
    button:hover, input:focus, textarea:focus, select:focus { border-color: rgba(10,132,255,0.8); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    #status { min-height: 18px; color: #0a84ff; font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    #log { position: absolute; left: 14px; right: 14px; bottom: 14px; max-height: 34vh; overflow: auto; margin: 0; padding: 12px; border: 1px solid rgba(255,255,255,0.14); background: rgba(0,0,0,0.58); color: rgba(255,255,255,0.76); font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; white-space: pre-wrap; }
    @media (max-width: 760px) {
        main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
        aside { border-right: 0; border-bottom: 1px solid rgba(255,255,255,0.14); }
        textarea { min-height: 84px; }
    }
</style>
</head>
<body>
<main>
    <aside>
        <label>method<select id="method"><option>command</option><option>on</option><option>observe</option></select></label>
        <label>selector<input id="selector" value="swipe:right" spellcheck="false"></label>
        <label>criteria<textarea id="criteria" spellcheck="false">{
  "fingers": 1,
  "speed": ["normal", "flick"]
}</textarea></label>
        <div class="row">
            <button id="apply">register</button>
            <button id="clear">clear</button>
        </div>
        <div id="status">ready</div>
    </aside>
    <section id="surface">
        <div id="target">gesture surface</div>
        <pre id="log">waiting</pre>
    </section>
</main>
<script src="../handtrick.js"></script>
<script>
const surface = document.getElementById('surface');
const methodInput = document.getElementById('method');
const selectorInput = document.getElementById('selector');
const criteriaInput = document.getElementById('criteria');
const status = document.getElementById('status');
const log = document.getElementById('log');
const hand = new HandTrick(surface, {
    pan: { fingers: [1, 2], canStart: () => true },
    path: { fingers: [1, 2], consume: 'auto' },
    wheel: { enabled: true, preventDefault: true }
});

function parseCriteria() {
    const raw = criteriaInput.value.trim();
    if (!raw) return null;
    return JSON.parse(raw);
}

function summary(event) {
    return [
        event.type,
        event.direction && event.direction !== 'none' ? 'dir=' + event.direction : '',
        'f=' + event.fingers,
        event.speed ? 'speed=' + event.speed : '',
        event.modified ? 'modified' : '',
        event.pathText ? 'path=' + event.pathText : '',
        event.region ? 'region=' + event.region : ''
    ].filter(Boolean).join('  ');
}

function write(event) {
    log.textContent = summary(event) + '\n' + log.textContent;
}

function register() {
    let criteria = null;
    const selector = selectorInput.value.trim();
    const method = methodInput.value;
    try {
        criteria = parseCriteria();
        hand.off();
        if (criteria) hand[method](selector, criteria, write);
        else hand[method](selector, write);
        status.textContent = method + ' ' + selector;
        log.textContent = 'waiting';
    } catch (error) {
        status.textContent = error.message;
    }
}

document.getElementById('apply').addEventListener('click', register);
document.getElementById('clear').addEventListener('click', () => {
    hand.off();
    log.textContent = 'waiting';
    status.textContent = 'cleared';
});
register();
</script>
</body>
</html>
