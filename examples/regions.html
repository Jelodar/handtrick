<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>HandTrick Regions</title>
<style>
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #060606; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #surface { position: fixed; inset: 0; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); touch-action: none; }
    .cell { display: grid; place-items: center; border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.42); font-size: 11px; font-weight: 800; letter-spacing: 0.12em; }
    #log { position: fixed; left: 14px; right: 14px; bottom: 14px; max-height: 130px; overflow: auto; margin: 0; padding: 12px; border: 1px solid rgba(255,255,255,0.14); background: rgba(0,0,0,0.58); font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
</style>
</head>
<body>
<main id="surface">
    <div class="cell">TOP LEFT</div><div class="cell">TOP</div><div class="cell">TOP RIGHT</div>
    <div class="cell">LEFT</div><div class="cell">CENTER</div><div class="cell">RIGHT</div>
    <div class="cell">BOTTOM LEFT</div><div class="cell">BOTTOM</div><div class="cell">BOTTOM RIGHT</div>
</main>
<pre id="log"></pre>
<script src="../handtrick.js"></script>
<script>
const surface = document.getElementById('surface');
const log = document.getElementById('log');
const hand = new HandTrick(surface);

function write(text) {
    log.textContent = text + '\n' + log.textContent;
}

hand.on('tap', event => {
    const cell = event.center.grid(3, 3);
    write('tap region=' + event.region + ' half=' + event.halfRegion + ' grid=' + cell.index);
});

hand.on('swipe:up', { startRegion: 'bottom' }, () => {
    write('bottom-up swipe');
});

hand.on('swipe:right', { region: { start: 'left', current: 'right' } }, () => {
    write('left-to-right swipe');
});

hand.on('tap:2x', { grid: { rows: 3, cols: 3, current: 'right', tapStart: 'left' } }, () => {
    write('left-to-right double tap');
});
</script>
</body>
</html>
