<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>HandTrick Basic</title>
<style>
    * {
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050505;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
        display: grid;
        grid-template-rows: minmax(0, 1fr) 120px;
    }

    #surface {
        display: grid;
        place-items: center;
        background:
            linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px),
            #070707;
        background-size: 36px 36px;
        touch-action: none;
    }

    #status {
        min-width: min(86vw, 560px);
        border: 1px solid rgba(255,255,255,0.2);
        padding: 20px;
        font-size: 13px;
        line-height: 1.6;
        background: rgba(0,0,0,0.38);
    }

    #log {
        margin: 0;
        padding: 14px;
        overflow: auto;
        border-top: 1px solid rgba(255,255,255,0.12);
        font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        color: rgba(255,255,255,0.72);
    }
</style>
</head>
<body>
<main id="surface">
    <div id="status">Tap, swipe, pinch, or rotate. Command handlers pick one winner; region and source appear below.</div>
</main>
<pre id="log"></pre>
<script src="../handtrick.js"></script>
<script>
const surface = document.getElementById('surface');
const status = document.getElementById('status');
const log = document.getElementById('log');
const hand = new HandTrick(surface);

function write(event) {
    const line = [
        event.type,
        'dir=' + event.direction,
        'region=' + event.region,
        'fingers=' + event.fingers,
        'source=' + event.fingerSource
    ].join('  ');
    log.textContent = line + '\n' + log.textContent;
    status.textContent = line;
}

hand.command('tap', { fingerSource: 'auto' }, write);
hand.command('swipe', { fingerSource: 'auto' }, write);
hand.command('pinch', event => {
    status.textContent = 'pinch scale=' + event.scale.toFixed(2);
});

hand.command('rotate', event => {
    status.textContent = 'rotate=' + event.rotation.toFixed(1);
});
</script>
</body>
</html>
