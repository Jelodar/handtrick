<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>HandTrick Rolling Tap</title>
<style>
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #050505; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #surface { position: fixed; inset: 0; display: grid; place-items: center; touch-action: none; background: #050505; }
    #readout { width: min(86vw, 620px); padding: 22px; border: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.34); font-size: 13px; line-height: 1.7; }
    b { display: block; margin-top: 10px; color: #0a84ff; font: 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    code { color: rgba(255,255,255,0.72); }
</style>
</head>
<body>
<main id="surface">
    <div id="readout">Tap two to four fingers in a quick overlapping wave. Simultaneous contacts and short same-place double taps stay taps.<b>waiting</b><code>try left-to-right, right-to-left, Meta-click line, or Alt+tap for normal two-finger tap</code></div>
</main>
<script src="../handtrick.js"></script>
<script>
const surface = document.getElementById('surface');
const value = document.querySelector('b');
const hand = new HandTrick(surface, {
    intent: { events: ['rollingtap', '2fingertap', '3fingertap', '4fingertap'] },
    pan: { enabled: false },
    swipe: { enabled: false },
    pinch: { enabled: false },
    rotate: { enabled: false },
    press: { enabled: false }
});

hand.on('rollingtap', event => {
    value.textContent = event.rolling.count + 'f rolling ' + event.direction + '  source=' + event.rolling.source + '  overlap=' + event.rolling.overlapCount + '  delays=' + event.rolling.delays.join('/');
});

hand.on('2fingertap', event => {
    value.textContent = '2f tap source=' + event.fingerSource;
});

hand.on('3fingertap', () => {
    value.textContent = '3f tap';
});

hand.on('4fingertap', () => {
    value.textContent = '4f tap';
});
</script>
</body>
</html>
