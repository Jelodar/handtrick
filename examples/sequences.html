<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>HandTrick Sequences</title>
<style>
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #050505; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { display: grid; grid-template-rows: minmax(0, 1fr) 150px; }
    #surface { display: grid; place-items: center; touch-action: none; }
    #readout { width: min(86vw, 680px); padding: 22px; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.03); font-size: 13px; line-height: 1.7; }
    b { display: block; margin-top: 12px; color: #0a84ff; font: 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    #log { margin: 0; overflow: auto; padding: 14px; border-top: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.72); font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
</style>
</head>
<body>
<main id="surface">
    <div id="readout">Try tap, tap, then swipe. While the sequence window is open, the long command wins and direct tap/swipe fallbacks do not also run. Alt makes the same chain two-finger on desktop.<b>waiting</b></div>
</main>
<pre id="log">waiting</pre>
<script src="../handtrick.js"></script>
<script>
const surface = document.getElementById('surface');
const value = document.querySelector('b');
const log = document.getElementById('log');
const hand = new HandTrick(surface, {
    intent: {
        events: ['tap>tap>swipe', 'tap>tap>swipe:right', 'tap:2x>swipe:right'],
        sequenceWindow: 1000
    },
    tapHold: { enabled: false },
    press: { enabled: false },
    pan: { enabled: false },
    pinch: { enabled: false },
    rotate: { enabled: false },
    swipe: { distanceByFingers: { 1: 70, 2: 60 }, minSamples: 1, minTime: 0 }
});

function write(text, event) {
    value.textContent = text;
    log.textContent = [
        text,
        event ? 'sequence=' + event.sequence.join('>') : '',
        event ? 'duration=' + Math.round(event.gestureSequence.duration) + 'ms' : '',
        event && event.direction !== 'none' ? 'dir=' + event.direction : ''
    ].filter(Boolean).join('  ') + '\n' + log.textContent;
}

hand.on('tap>tap>swipe', event => {
    write('tap tap swipe', event);
});
hand.on('tap>tap>swipe:right', event => {
    write('tap tap swipe:right', event);
});
hand.on('tap:2x>swipe:right', event => {
    write('tap:2x alias swipe:right', event);
});
</script>
</body>
</html>
