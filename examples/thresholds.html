<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>HandTrick Thresholds</title>
<style>
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #050505; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { display: grid; grid-template-columns: minmax(0, 1fr) 330px; }
    #surface { position: relative; overflow: hidden; touch-action: none; background: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px), #060606; background-size: 42px 42px; }
    #cross { position: absolute; left: 50%; top: 50%; width: min(30vw, 190px); aspect-ratio: 1; display: grid; place-items: center; border: 1px solid rgba(255,255,255,0.32); color: rgba(255,255,255,0.74); font-size: 11px; font-weight: 900; letter-spacing: 0.16em; transform: translate(-50%, -50%); }
    aside { min-width: 0; border-left: 1px solid rgba(255,255,255,0.1); background: #080808; display: grid; grid-template-rows: auto auto minmax(0, 1fr); }
    header { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    h1 { margin: 0; font-size: 13px; letter-spacing: 0.18em; }
    p { margin: 8px 0 0; color: rgba(255,255,255,0.56); font-size: 12px; line-height: 1.5; }
    .controls { display: grid; gap: 12px; padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    label { display: grid; gap: 5px; color: rgba(255,255,255,0.62); font-size: 10px; font-weight: 900; letter-spacing: 0.12em; }
    label span { display: flex; justify-content: space-between; gap: 10px; }
    b { color: #0a84ff; font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    input { width: 100%; accent-color: #0a84ff; }
    #log { min-height: 0; overflow: auto; margin: 0; padding: 14px 16px; color: rgba(255,255,255,0.74); font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    @media (max-width: 760px) { body { grid-template-columns: 1fr; grid-template-rows: minmax(0, 1fr) 46%; } aside { border-left: 0; border-top: 1px solid rgba(255,255,255,0.1); } }
</style>
</head>
<body>
<main id="surface"><div id="cross">TRY</div></main>
<aside>
    <header>
        <h1>THRESHOLDS</h1>
        <p>Adjust one control, try the same gesture again, compare emitted events.</p>
    </header>
    <div class="controls">
        <label><span>TAP MOVE <b data-value="tap">18</b></span><input data-control="tap" type="range" min="6" max="54" value="18"></label>
        <label><span>SWIPE PX <b data-value="swipe">90</b></span><input data-control="swipe" type="range" min="36" max="180" value="90"></label>
        <label><span>PINCH PX <b data-value="pinch">14</b></span><input data-control="pinch" type="range" min="6" max="70" value="14"></label>
        <label><span>ROTATE DEG <b data-value="rotate">24</b></span><input data-control="rotate" type="range" min="8" max="70" value="24"></label>
        <label><span>PATH PX <b data-value="path">44</b></span><input data-control="path" type="range" min="24" max="90" value="44"></label>
    </div>
    <pre id="log">waiting</pre>
</aside>
<script src="../handtrick.js"></script>
<script>
const surface = document.getElementById('surface');
const log = document.getElementById('log');
const cross = document.getElementById('cross');
const controls = Array.from(document.querySelectorAll('[data-control]'));
const hand = new HandTrick(surface, {
    intent: { events: ['tap', 'swipe', 'pinch', 'rotate', 'left>down'] },
    pan: { enabled: false },
    wheel: { enabled: false }
});

function value(name) {
    return Number(controls.find(input => input.dataset.control === name).value);
}

function apply() {
    controls.forEach(input => {
        document.querySelector('[data-value="' + input.dataset.control + '"]').textContent = input.value;
    });
    const swipe = value('swipe');
    hand.setOptions({
        tap: { maxMove: value('tap') },
        swipe: { distance: swipe, distanceByFingers: { 1: swipe, 2: Math.max(36, Math.round(swipe * 0.68)) } },
        pinch: { distance: value('pinch'), scale: Math.max(0.02, value('pinch') / 600) },
        rotate: { angle: value('rotate'), confidence: 0.88 },
        path: { minDistance: value('path'), segmentDistance: value('path') }
    });
}

function write(event) {
    const line = [
        event.type,
        event.direction && event.direction !== 'none' ? event.direction : '',
        event.pathText || '',
        'f=' + event.fingers,
        'd=' + Math.round(event.travel || event.pathDistance || 0),
        'c=' + (event.confidence ? event.confidence.toFixed(2) : '0')
    ].filter(Boolean).join('  ');
    log.textContent = line + '\n' + log.textContent;
    cross.textContent = event.type.toUpperCase().slice(0, 8);
}

controls.forEach(input => input.addEventListener('input', apply));
['tap', 'swipe', 'pinch', 'rotate', 'path', 'left>down'].forEach(type => hand.on(type, write));
apply();
</script>
</body>
</html>
