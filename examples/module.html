<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>HandTrick Module</title>
<style>
    * {
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050505;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
    }

    #surface {
        display: grid;
        place-items: center;
        touch-action: none;
        background:
            linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
            #070707;
        background-size: 36px 36px;
    }

    #target {
        width: min(72vw, 430px);
        aspect-ratio: 1.65;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255,255,255,0.24);
        background: rgba(10,132,255,0.06);
        transform-origin: center;
    }

    #target b {
        font-size: 13px;
        letter-spacing: 0.22em;
    }

    #target span {
        display: block;
        margin-top: 10px;
        color: rgba(255,255,255,0.56);
        font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        text-align: center;
    }

    #bar {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 1px;
        border-top: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.08);
    }

    .cell {
        min-width: 0;
        padding: 14px;
        background: #080808;
    }

    .cell span {
        display: block;
        color: rgba(255,255,255,0.44);
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.14em;
    }

    .cell b,
    .cell code {
        display: block;
        margin-top: 6px;
        color: rgba(255,255,255,0.86);
        font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        overflow-wrap: anywhere;
    }

    @media (max-width: 680px) {
        #bar {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>
<body>
<main id="surface">
    <div id="target">
        <div>
            <b>MODULE</b>
            <span id="status">tap, swipe, pinch, rotate</span>
        </div>
    </div>
</main>
<div id="bar">
    <div class="cell"><span>LOCAL DEV</span><code>import HandTrick from '../handtrick.mjs'</code></div>
    <div class="cell"><span>CDN PROD</span><code>import HandTrick from '.../handtrick.min.mjs'</code></div>
    <div class="cell"><span>MODULE RULE</span><code>serve locally if file:// blocks imports</code></div>
    <div class="cell"><span>LAST</span><b id="last">ready</b></div>
</div>
<script type="module">
    import HandTrick from '../handtrick.mjs';

    const surface = document.getElementById('surface');
    const target = document.getElementById('target');
    const status = document.getElementById('status');
    const last = document.getElementById('last');
    const state = {
        scale: 1,
        rotation: 0,
        startScale: 1,
        startRotation: 0
    };
    const hand = new HandTrick(surface, {
        preventDefault: false,
        claim: { preventDefault: true },
        wheel: { preventDefault: true }
    });

    function render() {
        target.style.transform = 'rotate(' + state.rotation + 'deg) scale(' + state.scale + ')';
    }

    function write(event) {
        const text = [event.type, event.direction || 'none', (event.fingers || 0) + 'F', event.region || 'none'].join('  ');
        status.textContent = text;
        last.textContent = text;
    }

    hand.observe('tap', write);
    hand.observe('swipe', write);
    hand.on('pinch:start', () => {
        state.startScale = state.scale;
    });
    hand.on('pinch', event => {
        state.scale = Math.max(0.45, Math.min(3, state.startScale * event.scale));
        write(event);
        render();
    });
    hand.on('rotate:start', () => {
        state.startRotation = state.rotation;
    });
    hand.on('rotate', event => {
        state.rotation = state.startRotation + event.rotation;
        write(event);
        render();
    });
</script>
</body>
</html>
